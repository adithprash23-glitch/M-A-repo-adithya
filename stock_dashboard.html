<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mergeon — Financial Intelligence</title>
<style>
  :root {
    --bg:        #080c14;
    --bg2:       #0d1421;
    --bg3:       #111827;
    --border:    #1e2d3d;
    --border2:   #243447;
    --text:      #e8edf5;
    --text2:     #8899aa;
    --text3:     #5a6a7a;
    --green:     #10b981;
    --green-dim: #064e3b;
    --red:       #ef4444;
    --red-dim:   #450a0a;
    --yellow:    #f59e0b;
    --blue:      #3b82f6;
    --blue-dim:  #1e3a5f;
    --purple:    #8b5cf6;
    --accent:    #0ea5e9;
    --radius:    10px;
    --shadow:    0 4px 24px rgba(0,0,0,0.4);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 14px;
    min-height: 100vh;
  }

  /* ── Header ─────────────────────────────────────────────── */
  header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    position: sticky;
    top: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 58px;
    gap: 16px;
  }
  .logo {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.5px;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .logo span { color: var(--accent); }
  .header-stats {
    display: flex;
    gap: 24px;
    align-items: center;
  }
  .hstat { text-align: center; }
  .hstat-val { font-size: 15px; font-weight: 700; }
  .hstat-lbl { font-size: 11px; color: var(--text2); margin-top: 1px; }
  .hstat-val.green  { color: var(--green); }
  .hstat-val.red    { color: var(--red); }
  .hstat-val.accent { color: var(--accent); }
  .header-right { display: flex; gap: 10px; align-items: center; }

  /* ── Buttons ─────────────────────────────────────────────── */
  .btn {
    padding: 7px 14px;
    border-radius: 7px;
    border: 1px solid var(--border2);
    background: var(--bg3);
    color: var(--text);
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    transition: all 0.15s;
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .btn:hover { background: var(--border); border-color: var(--border2); }
  .btn.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .btn.primary:hover { opacity: 0.88; }
  .btn.sm { padding: 5px 11px; font-size: 12px; }

  /* ── Main layout ─────────────────────────────────────────── */
  main { padding: 20px 24px; max-width: 1600px; margin: 0 auto; }

  /* ── Filter bar ──────────────────────────────────────────── */
  .filter-bar {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .tabs {
    display: flex;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }
  .tab {
    padding: 7px 14px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 500;
    color: var(--text2);
    transition: all 0.15s;
    white-space: nowrap;
    border: none;
    background: none;
  }
  .tab:hover { color: var(--text); background: var(--border); }
  .tab.active { background: var(--accent); color: #fff; }
  .separator { width: 1px; background: var(--border); height: 30px; }
  .sort-label { color: var(--text2); font-size: 12px; }
  select.sort-select {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--text);
    padding: 6px 10px;
    font-size: 13px;
    cursor: pointer;
    outline: none;
  }
  .search-input {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--text);
    padding: 7px 12px;
    font-size: 13px;
    outline: none;
    width: 200px;
    transition: border 0.15s;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--text3); }

  /* ── Loading / status bar ────────────────────────────────── */
  .status-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 16px;
    font-size: 13px;
    color: var(--text2);
  }
  .spinner {
    width: 14px; height: 14px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    flex-shrink: 0;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .dot.green { background: var(--green); }
  .dot.yellow { background: var(--yellow); }

  /* ── Top Picks section ───────────────────────────────────── */
  .section-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-title::after {
    content: "";
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .top-picks-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 12px;
    margin-bottom: 28px;
  }

  /* ── Stock grid ──────────────────────────────────────────── */
  .stock-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 12px;
  }

  /* ── Stock Card ──────────────────────────────────────────── */
  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
    overflow: hidden;
  }
  .card:hover {
    border-color: var(--border2);
    transform: translateY(-1px);
    box-shadow: var(--shadow);
  }
  .card.top-pick {
    border-color: var(--accent);
    background: linear-gradient(135deg, var(--bg2) 0%, #0d1e2e 100%);
  }
  .card.top-pick::before {
    content: "TOP PICK";
    position: absolute;
    top: 9px; right: 9px;
    font-size: 9px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.08em;
    background: rgba(14, 165, 233, 0.12);
    padding: 2px 6px;
    border-radius: 4px;
  }

  .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
  .card-ticker { font-size: 15px; font-weight: 700; color: var(--text); }
  .card-name   { font-size: 11px; color: var(--text2); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 140px; }
  .card-industry { font-size: 10px; color: var(--text3); margin-top: 2px; }

  /* Score circle */
  .score-badge {
    width: 44px; height: 44px;
    border-radius: 50%;
    border: 2.5px solid;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: 800;
    flex-shrink: 0;
  }
  .score-badge.s-high   { border-color: var(--green);  color: var(--green);  background: rgba(16,185,129,0.08); }
  .score-badge.s-good   { border-color: #84cc16;       color: #84cc16;       background: rgba(132,204,22,0.08); }
  .score-badge.s-mid    { border-color: var(--yellow);  color: var(--yellow); background: rgba(245,158,11,0.08); }
  .score-badge.s-low    { border-color: #f97316;       color: #f97316;       background: rgba(249,115,22,0.08); }
  .score-badge.s-bear   { border-color: var(--red);    color: var(--red);    background: rgba(239,68,68,0.08); }

  /* Price row */
  .price-row { display: flex; align-items: baseline; gap: 8px; margin-bottom: 10px; }
  .price-val  { font-size: 18px; font-weight: 700; }
  .price-chg  { font-size: 13px; font-weight: 600; }
  .price-chg.up   { color: var(--green); }
  .price-chg.down { color: var(--red); }

  /* Score bars */
  .score-bars { margin-bottom: 10px; }
  .score-bar-row {
    display: flex; align-items: center; gap: 6px; margin-bottom: 4px;
  }
  .score-bar-lbl { font-size: 10px; color: var(--text3); width: 24px; }
  .score-bar-track {
    flex: 1; height: 4px; background: var(--border);
    border-radius: 2px; overflow: hidden;
  }
  .score-bar-fill { height: 100%; border-radius: 2px; transition: width 0.6s ease; }
  .fill-tech { background: var(--accent); }
  .fill-fund { background: var(--purple); }
  .score-bar-num { font-size: 10px; color: var(--text2); width: 22px; text-align: right; }

  /* Metrics row */
  .metrics-row {
    display: flex; gap: 8px; margin-bottom: 10px;
  }
  .metric {
    background: var(--bg3);
    border-radius: 5px;
    padding: 4px 7px;
    text-align: center;
    flex: 1;
  }
  .metric-val { font-size: 12px; font-weight: 600; }
  .metric-lbl { font-size: 10px; color: var(--text3); }

  /* Sparkline */
  .sparkline-wrap { margin-bottom: 8px; }

  /* Signal */
  .signal-tags {
    font-size: 11px;
    color: var(--text3);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* ── AI Analysis Modal ───────────────────────────────────── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: 14px;
    width: 100%;
    max-width: 780px;
    max-height: 88vh;
    overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6);
  }
  .modal-header {
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    position: sticky;
    top: 0;
    background: var(--bg2);
    z-index: 1;
  }
  .modal-title { font-size: 16px; font-weight: 700; }
  .modal-close {
    background: none; border: none; color: var(--text2);
    cursor: pointer; font-size: 20px; line-height: 1; padding: 4px;
  }
  .modal-body { padding: 20px 24px; }

  .ai-loading {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 14px; padding: 40px 0; color: var(--text2);
  }
  .ai-loading .spinner { width: 28px; height: 28px; border-width: 3px; }

  .ai-pick-card {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 14px 16px;
    margin-bottom: 10px;
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 12px;
    align-items: start;
  }
  .ai-ticker {
    font-size: 14px; font-weight: 700;
    padding: 6px 0;
    min-width: 70px;
  }
  .ai-content {}
  .ai-thesis { font-size: 13px; color: var(--text); margin-bottom: 6px; line-height: 1.5; }
  .ai-risk   { font-size: 12px; color: var(--text2); margin-bottom: 6px; }
  .ai-risk strong { color: var(--red); }
  .conviction {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 700;
  }
  .conviction.HIGH   { background: rgba(16,185,129,0.15); color: var(--green); }
  .conviction.MEDIUM { background: rgba(245,158,11,0.15);  color: var(--yellow); }
  .conviction.LOW    { background: rgba(239,68,68,0.12);   color: var(--red); }

  .macro-box {
    background: var(--blue-dim);
    border: 1px solid var(--blue);
    border-radius: 8px;
    padding: 14px 16px;
    margin-top: 16px;
  }
  .macro-box h4 { font-size: 12px; color: var(--blue); font-weight: 600; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.06em; }
  .macro-box p  { font-size: 13px; color: var(--text); line-height: 1.6; }

  /* ── Empty / error states ────────────────────────────────── */
  .empty {
    grid-column: 1/-1;
    text-align: center;
    padding: 60px 20px;
    color: var(--text2);
  }
  .empty h3 { font-size: 16px; margin-bottom: 8px; }
  .empty p  { font-size: 13px; color: var(--text3); }

  /* ── Skeleton loader ─────────────────────────────────────── */
  .skeleton {
    background: linear-gradient(90deg, var(--bg3) 0%, var(--border) 50%, var(--bg3) 100%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
    border-radius: 4px;
  }
  @keyframes shimmer { to { background-position: -200% 0; } }

  /* ── Responsive ──────────────────────────────────────────── */
  @media(max-width: 640px) {
    header { padding: 0 14px; }
    main   { padding: 14px; }
    .header-stats { gap: 14px; }
    .hstat-val { font-size: 13px; }
  }
</style>
</head>
<body>

<!-- ── Header ──────────────────────────────────────────────────────────────── -->
<header>
  <div class="logo">
    <svg width="22" height="22" viewBox="0 0 22 22" fill="none">
      <path d="M3 17L8 11L12 14L17 7L20 10" stroke="#0ea5e9" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="20" cy="10" r="2" fill="#0ea5e9"/>
    </svg>
    <span>Mergeon</span>&nbsp;Financial
  </div>

  <div class="header-stats" id="headerStats">
    <div class="hstat"><div class="hstat-val accent" id="hTotalStocks">—</div><div class="hstat-lbl">Stocks</div></div>
    <div class="hstat"><div class="hstat-val green"  id="hGainers">—</div><div class="hstat-lbl">Gainers</div></div>
    <div class="hstat"><div class="hstat-val red"    id="hLosers">—</div><div class="hstat-lbl">Losers</div></div>
    <div class="hstat"><div class="hstat-val accent" id="hAvgScore">—</div><div class="hstat-lbl">Avg Score</div></div>
    <div class="hstat"><div class="hstat-val"        id="hUpdated" style="color:var(--text2);font-size:12px">—</div><div class="hstat-lbl">Updated</div></div>
  </div>

  <div class="header-right">
    <button class="btn sm" onclick="openAnalysis()">🤖 AI Analysis</button>
    <button class="btn sm" onclick="manualRefresh()" id="refreshBtn">↺ Refresh</button>
  </div>
</header>

<!-- ── Main ────────────────────────────────────────────────────────────────── -->
<main>

  <!-- Status bar -->
  <div class="status-bar" id="statusBar" style="display:none">
    <div class="spinner" id="statusSpinner"></div>
    <div class="dot green" id="statusDot" style="display:none"></div>
    <span id="statusText">Loading stock data… this takes about 30 seconds on first load.</span>
  </div>

  <!-- Filter bar -->
  <div class="filter-bar">
    <!-- Region tabs -->
    <div class="tabs" id="regionTabs">
      <button class="tab active" data-region="All"   onclick="setRegion('All')">All Markets</button>
      <button class="tab"        data-region="US"    onclick="setRegion('US')">🇺🇸 US</button>
      <button class="tab"        data-region="India" onclick="setRegion('India')">🇮🇳 India</button>
    </div>

    <div class="separator"></div>

    <!-- Industry tabs (dynamic) -->
    <div class="tabs" id="industryTabs"></div>

    <div class="separator"></div>

    <span class="sort-label">Sort by</span>
    <select class="sort-select" id="sortSelect" onchange="applyFilters()">
      <option value="combined_score">Combined Score</option>
      <option value="change_pct_desc">Best Today ▲</option>
      <option value="change_pct_asc">Worst Today ▼</option>
      <option value="technical_score">Tech Score</option>
      <option value="fundamental_score">Fund Score</option>
    </select>

    <input class="search-input" id="searchInput" placeholder="Search ticker or name…" oninput="applyFilters()">
  </div>

  <!-- Top Picks section -->
  <div id="topPicksSection">
    <div class="section-title">⚡ Top Picks — Highest Combined Score</div>
    <div class="top-picks-grid" id="topPicksGrid"></div>
  </div>

  <!-- All stocks -->
  <div class="section-title" id="allStocksTitle">All Stocks</div>
  <div class="stock-grid" id="stockGrid"></div>

</main>

<!-- ── AI Analysis Modal ────────────────────────────────────────────────────── -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">🤖 AI Analysis — Top 10 Picks</div>
      <button class="modal-close" onclick="closeModalDirect()">✕</button>
    </div>
    <div class="modal-body" id="modalBody">
      <div class="ai-loading">
        <div class="spinner" style="width:28px;height:28px;border-width:3px"></div>
        <span>Asking Claude to analyse today's top picks…</span>
      </div>
    </div>
  </div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────────
let ALL_STOCKS   = [];
let activeRegion = "All";
let activeIndustry = "All";
let pollTimer    = null;
let isLoaded     = false;

// ── Industry config ────────────────────────────────────────────────────────────
const INDUSTRIES = {
  All:   ["All"],
  US:    ["All", "Technology", "Healthcare", "Finance", "Energy", "Consumer", "Industrial"],
  India: ["All", "IT", "Banking", "FMCG", "Pharma", "Auto", "Infrastructure"],
};

// ── Score helpers ──────────────────────────────────────────────────────────────
function scoreClass(s) {
  if (s >= 75) return "s-high";
  if (s >= 60) return "s-good";
  if (s >= 45) return "s-mid";
  if (s >= 30) return "s-low";
  return "s-bear";
}

function fmtPrice(price, currency) {
  if (currency === "INR") return "₹" + price.toLocaleString("en-IN", {maximumFractionDigits:2});
  return "$" + price.toLocaleString("en-US", {maximumFractionDigits:2});
}

function fmtCap(cap) {
  if (!cap) return "—";
  if (cap >= 1e12) return "$" + (cap/1e12).toFixed(1) + "T";
  if (cap >= 1e9)  return "$" + (cap/1e9).toFixed(1)  + "B";
  if (cap >= 1e6)  return "$" + (cap/1e6).toFixed(1)  + "M";
  return "$" + cap;
}

// ── Sparkline ──────────────────────────────────────────────────────────────────
function sparkline(prices, w=110, h=32) {
  if (!prices || prices.length < 2) return "";
  const min = Math.min(...prices), max = Math.max(...prices);
  const range = (max - min) || 0.01;
  const pts = prices.map((p, i) => {
    const x = (i / (prices.length - 1)) * w;
    const y = h - ((p - min) / range) * (h - 2) - 1;
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(" ");
  const isUp = prices[prices.length-1] >= prices[0];
  const col  = isUp ? "#10b981" : "#ef4444";
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg">
    <polyline points="${pts}" fill="none" stroke="${col}" stroke-width="1.6"
      stroke-linecap="round" stroke-linejoin="round"/>
  </svg>`;
}

// ── Card renderer ──────────────────────────────────────────────────────────────
function renderCard(s, isTop=false) {
  const chgSign  = s.change_pct >= 0 ? "+" : "";
  const chgClass = s.change_pct >= 0 ? "up" : "down";
  const sc       = scoreClass(s.combined_score);
  const rsi      = s.tech_details?.rsi ?? "—";
  const pe       = s.fund_details?.pe_ratio ?? "—";
  const topCls   = isTop ? " top-pick" : "";

  return `
  <div class="card${topCls}" onclick="cardClick('${s.ticker}')">
    <div class="card-header">
      <div>
        <div class="card-ticker">${s.ticker.replace('.NS','').replace('.BO','')}</div>
        <div class="card-name" title="${s.name}">${s.name || s.ticker}</div>
        <div class="card-industry">${s.region} · ${s.industry}</div>
      </div>
      <div class="score-badge ${sc}">${s.combined_score}</div>
    </div>

    <div class="price-row">
      <span class="price-val">${fmtPrice(s.current_price, s.currency)}</span>
      <span class="price-chg ${chgClass}">${chgSign}${s.change_pct.toFixed(2)}%</span>
    </div>

    <div class="score-bars">
      <div class="score-bar-row">
        <span class="score-bar-lbl">Tech</span>
        <div class="score-bar-track">
          <div class="score-bar-fill fill-tech" style="width:${s.technical_score}%"></div>
        </div>
        <span class="score-bar-num">${s.technical_score}</span>
      </div>
      <div class="score-bar-row">
        <span class="score-bar-lbl">Fund</span>
        <div class="score-bar-track">
          <div class="score-bar-fill fill-fund" style="width:${s.fundamental_score}%"></div>
        </div>
        <span class="score-bar-num">${s.fundamental_score}</span>
      </div>
    </div>

    <div class="metrics-row">
      <div class="metric">
        <div class="metric-val" style="color:${rsi<35?'var(--green)':rsi>65?'var(--red)':'var(--text)'}">${typeof rsi === 'number' ? rsi.toFixed(1) : rsi}</div>
        <div class="metric-lbl">RSI</div>
      </div>
      <div class="metric">
        <div class="metric-val">${pe !== '—' ? pe : '—'}</div>
        <div class="metric-lbl">P/E</div>
      </div>
      <div class="metric">
        <div class="metric-val">${fmtCap(s.market_cap)}</div>
        <div class="metric-lbl">Mkt Cap</div>
      </div>
    </div>

    <div class="sparkline-wrap">${sparkline(s.sparkline)}</div>
    <div class="signal-tags" title="${s.signal}">${s.signal || "Neutral"}</div>
  </div>`;
}

// ── Industry tabs ──────────────────────────────────────────────────────────────
function renderIndustryTabs() {
  const inds = INDUSTRIES[activeRegion] || INDUSTRIES["All"];
  const container = document.getElementById("industryTabs");
  container.innerHTML = inds.map(ind => `
    <button class="tab${activeIndustry === ind ? " active" : ""}"
            onclick="setIndustry('${ind}')">${ind}</button>
  `).join("");
}

// ── Filtering & rendering ──────────────────────────────────────────────────────
function applyFilters() {
  const sortVal = document.getElementById("sortSelect").value;
  const query   = document.getElementById("searchInput").value.toLowerCase().trim();

  let filtered = ALL_STOCKS.filter(s => {
    if (activeRegion !== "All" && s.region !== activeRegion) return false;
    if (activeIndustry !== "All" && s.industry !== activeIndustry) return false;
    if (query) {
      const ticker = s.ticker.toLowerCase();
      const name   = (s.name || "").toLowerCase();
      if (!ticker.includes(query) && !name.includes(query)) return false;
    }
    return true;
  });

  // Sort
  filtered.sort((a, b) => {
    if (sortVal === "combined_score")   return b.combined_score   - a.combined_score;
    if (sortVal === "technical_score")  return b.technical_score  - a.technical_score;
    if (sortVal === "fundamental_score")return b.fundamental_score- a.fundamental_score;
    if (sortVal === "change_pct_desc")  return b.change_pct - a.change_pct;
    if (sortVal === "change_pct_asc")   return a.change_pct - b.change_pct;
    return 0;
  });

  // Top picks: top 5 from filtered set
  const top5 = filtered.slice(0, 5);
  const rest  = filtered.slice(5);

  document.getElementById("topPicksGrid").innerHTML =
    top5.length ? top5.map(s => renderCard(s, true)).join("") : "";
  document.getElementById("topPicksSection").style.display = top5.length ? "" : "none";

  const allTitle = document.getElementById("allStocksTitle");
  allTitle.textContent = `All Stocks (${filtered.length})`;

  const grid = document.getElementById("stockGrid");
  if (!rest.length && !top5.length) {
    grid.innerHTML = `<div class="empty"><h3>No stocks found</h3><p>Try adjusting your filters or search.</p></div>`;
  } else {
    grid.innerHTML = rest.map(s => renderCard(s, false)).join("");
  }

  updateHeaderStats(filtered);
}

function updateHeaderStats(filtered) {
  const gainers  = filtered.filter(s => s.change_pct > 0).length;
  const losers   = filtered.filter(s => s.change_pct < 0).length;
  const avgScore = filtered.length
    ? Math.round(filtered.reduce((a, s) => a + s.combined_score, 0) / filtered.length) : 0;

  document.getElementById("hTotalStocks").textContent = filtered.length;
  document.getElementById("hGainers").textContent     = gainers;
  document.getElementById("hLosers").textContent      = losers;
  document.getElementById("hAvgScore").textContent    = avgScore;
}

// ── Region / Industry setters ──────────────────────────────────────────────────
function setRegion(r) {
  activeRegion   = r;
  activeIndustry = "All";
  document.querySelectorAll("#regionTabs .tab").forEach(t =>
    t.classList.toggle("active", t.dataset.region === r));
  renderIndustryTabs();
  applyFilters();
}

function setIndustry(ind) {
  activeIndustry = ind;
  document.querySelectorAll("#industryTabs .tab").forEach(t =>
    t.classList.toggle("active", t.textContent === ind));
  applyFilters();
}

// ── Card click ─────────────────────────────────────────────────────────────────
function cardClick(ticker) {
  const url = `https://finance.yahoo.com/quote/${encodeURIComponent(ticker)}`;
  window.open(url, "_blank", "noopener");
}

// ── Data fetching ──────────────────────────────────────────────────────────────
function setStatus(loading, msg) {
  const bar     = document.getElementById("statusBar");
  const spinner = document.getElementById("statusSpinner");
  const dot     = document.getElementById("statusDot");
  const txt     = document.getElementById("statusText");

  bar.style.display = "flex";
  spinner.style.display = loading ? "" : "none";
  dot.style.display     = loading ? "none" : "";
  txt.textContent       = msg;
}

async function fetchStocks() {
  try {
    const res  = await fetch("/api/stocks");
    const data = await res.json();

    if (data.stocks && data.stocks.length > 0) {
      ALL_STOCKS = data.stocks;
      isLoaded   = true;

      // Update "last updated" stamp
      if (data.last_updated) {
        const d = new Date(data.last_updated);
        document.getElementById("hUpdated").textContent =
          d.toLocaleTimeString([], {hour:"2-digit", minute:"2-digit"});
      }

      renderIndustryTabs();
      applyFilters();
      setStatus(false, `✓ ${data.count} stocks loaded · prices delayed ~15 min · auto-refreshes every 15 min`);

      // Switch to slow polling once loaded
      clearInterval(pollTimer);
      pollTimer = setInterval(fetchStocks, 60_000);

    } else if (data.loading) {
      setStatus(true, "Fetching live stock data from Yahoo Finance… (~30 seconds on first load)");
      // Fast-poll until data arrives
      if (!isLoaded) {
        clearInterval(pollTimer);
        pollTimer = setInterval(fetchStocks, 3_000);
      }
    } else {
      setStatus(false, "⚠️ No data available. Try refreshing.");
    }
  } catch (e) {
    setStatus(false, `⚠️ Could not reach server: ${e.message}`);
  }
}

async function manualRefresh() {
  const btn = document.getElementById("refreshBtn");
  btn.textContent = "↺ Refreshing…";
  btn.disabled = true;
  try {
    await fetch("/api/refresh");
    setStatus(true, "Refreshing prices…");
    isLoaded = false;
    clearInterval(pollTimer);
    pollTimer = setInterval(fetchStocks, 3_000);
  } finally {
    setTimeout(() => { btn.textContent = "↺ Refresh"; btn.disabled = false; }, 2000);
  }
}

// ── AI Analysis ────────────────────────────────────────────────────────────────
async function openAnalysis() {
  document.getElementById("modalOverlay").classList.add("open");
  document.getElementById("modalBody").innerHTML = `
    <div class="ai-loading">
      <div class="spinner" style="width:28px;height:28px;border-width:3px"></div>
      <span>Asking Claude to analyse today's top picks…</span>
    </div>`;

  try {
    const res  = await fetch("/api/analyze", {method:"POST", headers:{"Content-Type":"application/json"}, body:"{}"});
    const data = await res.json();

    if (data.error) {
      document.getElementById("modalBody").innerHTML = `
        <div style="padding:20px;color:var(--text2)">⚠️ ${data.error}</div>`;
      return;
    }

    let html = "";
    (data.picks || []).forEach(p => {
      html += `
      <div class="ai-pick-card">
        <div class="ai-ticker">${p.ticker}
          <span class="conviction ${p.conviction}">${p.conviction}</span>
        </div>
        <div class="ai-content">
          <div class="ai-thesis">${p.thesis}</div>
          <div class="ai-risk"><strong>Risk:</strong> ${p.key_risk}</div>
        </div>
      </div>`;
    });

    if (data.macro_themes) {
      html += `
      <div class="macro-box">
        <h4>Macro Themes</h4>
        <p>${data.macro_themes}</p>
      </div>`;
    }

    document.getElementById("modalBody").innerHTML = html ||
      `<div style="padding:20px;color:var(--text2)">No analysis returned.</div>`;

  } catch (e) {
    document.getElementById("modalBody").innerHTML =
      `<div style="padding:20px;color:var(--red)">Error: ${e.message}</div>`;
  }
}

function closeModal(e) {
  if (e.target === document.getElementById("modalOverlay")) closeModalDirect();
}
function closeModalDirect() {
  document.getElementById("modalOverlay").classList.remove("open");
}

// ── Skeleton on first load ─────────────────────────────────────────────────────
function showSkeleton() {
  const grid = document.getElementById("stockGrid");
  grid.innerHTML = Array(12).fill(0).map(() => `
    <div class="card">
      <div class="skeleton" style="height:16px;width:70%;margin-bottom:8px"></div>
      <div class="skeleton" style="height:12px;width:50%;margin-bottom:14px"></div>
      <div class="skeleton" style="height:28px;width:90%;margin-bottom:12px"></div>
      <div class="skeleton" style="height:8px;width:100%;margin-bottom:6px"></div>
      <div class="skeleton" style="height:8px;width:100%;margin-bottom:12px"></div>
      <div class="skeleton" style="height:32px;width:100%"></div>
    </div>`).join("");
}

// ── Init ───────────────────────────────────────────────────────────────────────
document.addEventListener("DOMContentLoaded", () => {
  renderIndustryTabs();
  showSkeleton();
  setStatus(true, "Connecting to server…");
  fetchStocks();
});

// Close modal on Escape
document.addEventListener("keydown", e => {
  if (e.key === "Escape") closeModalDirect();
});
</script>
</body>
</html>
